<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Debt Tracker{% endblock %}</title>
  <script>
    try {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    } catch(e) {}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));

    @theme {
      --font-mono: ui-monospace, "JetBrains Mono", "Fira Code", monospace;
    }

    body { font-family: var(--font-mono); }

    input, select, textarea, button { font-family: inherit; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #71717a; }
    .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block theme_toggle %}
  <button id="theme-toggle"
    class="fixed top-4 right-5 text-xs tracking-widest uppercase text-zinc-400 dark:text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors cursor-pointer z-10">
  </button>
  {% endblock %}
  {% block body %}{% endblock %}
  <script>
    // Theme toggle
    const themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.textContent = document.documentElement.classList.contains('dark') ? 'Tema claro' : 'Tema escuro';
      themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        document.documentElement.classList.toggle('dark', !isDark);
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        themeBtn.textContent = !isDark ? 'Tema claro' : 'Tema escuro';
      });
    }

    // Custom form validation — replaces browser native bubbles
    document.addEventListener('invalid', (e) => {
      e.preventDefault();
      const el = e.target;
      if (!el._errEl || !el._errEl.isConnected) {
        const err = document.createElement('p');
        err.className = 'field-error text-xs text-red-500 mt-1 tracking-wide';
        el.insertAdjacentElement('afterend', err);
        el._errEl = err;
      }
      el._errEl.textContent = el.validity.valueMissing ? 'Campo obrigatório'
        : el.validity.typeMismatch   ? 'Formato inválido'
        : el.validity.tooShort       ? 'Muito curto'
        : 'Valor inválido';
    }, true);

    document.addEventListener('input', (e) => {
      if (e.target._errEl && e.target.validity.valid) e.target._errEl.textContent = '';
    }, true);

    document.addEventListener('focusout', (e) => {
      const el = e.target;
      if (el._errEl) { el._errEl.remove(); el._errEl = null; }
      const form = el.closest('form');
      if (form && !form.contains(e.relatedTarget)) {
        form.querySelectorAll('.field-error').forEach(err => err.remove());
        form.querySelectorAll('input, select, textarea').forEach(i => { if (i._errEl) i._errEl = null; });
      }
    });

    // Click outside: first clears errors, second closes open <details>
    document.addEventListener('click', (e) => {
      if (e.target.matches('input, select, textarea')) return;
      const errors = document.querySelectorAll('.field-error');
      if (errors.length > 0) {
        errors.forEach(err => err.remove());
        document.querySelectorAll('input, select, textarea').forEach(el => { if (el._errEl) el._errEl = null; });
        return;
      }
      document.querySelectorAll('details[open]').forEach(d => {
        if (!d.contains(e.target)) d.removeAttribute('open');
      });
    });

    function resetForm(form) {
      if (!form) return;
      form.querySelectorAll('input, textarea').forEach(el => {
        el.value = '';
        if (el._errEl) { el._errEl.remove(); el._errEl = null; }
      });
      form.querySelectorAll('select').forEach(sel => { sel.selectedIndex = 0; });
      form.querySelectorAll('.field-error').forEach(el => el.remove());
    }

    // Reset forms when <details> opens so the form is always clean
    document.addEventListener('toggle', (e) => {
      if (e.target.tagName !== 'DETAILS' || !e.target.open) return;
      e.target.querySelectorAll('form').forEach(resetForm);
    }, true);

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      document.querySelectorAll('[data-edit-cancel]').forEach(btn => {
        if (!btn.closest('.hidden')) {
          resetForm(btn.closest('form'));
          btn.click();
        }
      });
      document.querySelectorAll('details[open]').forEach(el => {
        el.removeAttribute('open');
      });
    });
  </script>
</body>
</html>
