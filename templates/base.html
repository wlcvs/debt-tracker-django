<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Debt Tracker{% endblock %}</title>
  <script>
    try {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    } catch(e) {}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));

    @theme {
      --font-mono: ui-monospace, "JetBrains Mono", "Fira Code", monospace;
    }

    body { font-family: var(--font-mono); }

    input, select, textarea, button { font-family: inherit; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #71717a; }
    .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
</body>
</html>
