{% extends "base.html" %}
{% block title %}{{ title }} — Debt Tracker{% endblock %}

{% block content %}
<div class="max-w-lg">
  <a href="{{ back_url }}" class="text-xs uppercase tracking-widest opacity-40 hover:opacity-100 mb-6 block">← Voltar</a>
  <h1 class="text-2xl font-bold tracking-tight uppercase mb-8">{{ title }}</h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label for="{{ field.id_for_label }}"
          class="block text-xs uppercase tracking-widest opacity-40 mb-1">
          {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
          <p class="text-xs opacity-60 mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="border border-current px-6 py-2 text-xs uppercase tracking-widest hover:bg-current hover:text-[var(--bg)] transition-colors">
        Salvar
      </button>
      <a href="{{ back_url }}"
        class="border border-current/40 px-6 py-2 text-xs uppercase tracking-widest hover:border-current transition-colors">
        Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
